<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オルカン予想・積立ツール</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f8f9fa;
        }
        h2, h3 {
            color: #2c3e50;
            border-bottom: 2px solid #ddd;
            padding-bottom: 8px;
        }
        .card {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        .pred-box {
            background-color: #e8f4fd;
            border-left: 5px solid #3498db;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 20px;
            background-color: #fff;
        }
        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        /* シミュレーター用のスタイル */
        .form-group {
            margin-bottom: 15px;
        }
        .form-label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .input-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        input[type="range"] {
            flex: 1;
        }
        input[type="number"] {
            width: 80px;
            padding: 5px;
            font-size: 16px;
        }
        .result-summary {
            display: flex;
            justify-content: space-around;
            background-color: #f1f8e9;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            text-align: center;
            border-left: 5px solid #7cb342;
        }
        .result-val {
            font-size: 20px;
            font-weight: bold;
            color: #33691e;
        }
        .chart-container {
            position: relative;
            margin-top: 20px;
            height: 350px;
            width: 100%;
        }
    </style>
</head>
<body>

    <h2>本日のオルカン予想基準価額</h2>
    
    <div class="card pred-box">
        <p style="margin-top: 0;">予想基準価額: <strong id="display_nav" style="font-size: 24px;">--</strong> 円
            <span style="font-size: 0.8em; color: gray;">(前回基準価額: <span id="display_base">--</span> 円)</span>
        </p>
        <p>前日比: <span id="display_diff" style="font-weight: bold;">--</span> 円 (<span id="display_percent" style="font-weight: bold;">--</span>%)</p>
        <p style="font-size: 12px; color: gray; margin-bottom: 0;">最終更新日時: <span id="display_time">--</span></p>
    </div>

    <h3>直近の予想と結果の履歴</h3>
    <div class="card" style="padding: 0; overflow-x: auto;">
        <table style="margin: 0; border: none;">
            <thead>
                <tr>
                    <th>日付</th>
                    <th>予想価格</th>
                    <th>予想前日比</th>
                    <th>実際の基準価額</th>
                </tr>
            </thead>
            <tbody id="history_table_body">
                </tbody>
        </table>
    </div>

    <h3>資産運用シミュレーション</h3>
    <div class="card">
        <div class="form-group">
            <label class="form-label">毎月積立額</label>
            <div class="input-row">
                <input type="range" id="slide_amount" min="0.1" max="30" step="0.1" value="10">
                <input type="number" id="num_amount" min="0.1" max="30" step="0.1" value="10"> 万円
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">投資期間</label>
            <div class="input-row">
                <input type="range" id="slide_years" min="1" max="40" step="1" value="15">
                <input type="number" id="num_years" min="1" max="40" step="1" value="15"> 年
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">想定利回り（年率）</label>
            <div class="input-row">
                <input type="range" id="slide_rate" min="0" max="30" step="0.1" value="20.1">
                <input type="number" id="num_rate" min="0" max="30" step="0.1" value="20.1"> %
            </div>
        </div>

        <div class="result-summary">
            <div>
                <div>積立金額（元本）</div>
                <div id="res_principal" class="result-val">--</div>
            </div>
            <div>
                <div>運用収益</div>
                <div id="res_earnings" class="result-val">--</div>
            </div>
            <div>
                <div>資産総額</div>
                <div id="res_total" class="result-val" style="font-size: 24px; color: #1b5e20;">--</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="simChart"></canvas>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 予想データおよび履歴テーブルの制御
        // ==========================================
        fetch('result.json')
            .then(response => response.json())
            .then(dataList => {
                if (!Array.isArray(dataList) || dataList.length === 0) return;

                // メイン枠の表示
                const latestData = dataList[0];
                document.getElementById('display_nav').innerText = Math.round(latestData.nav_pred).toLocaleString();
                document.getElementById('display_diff').innerText = (latestData.diff_nav >= 0 ? "+" : "") + Math.round(latestData.diff_nav).toLocaleString();
                document.getElementById('display_percent').innerText = (latestData.r_pred_percent >= 0 ? "+" : "") + latestData.r_pred_percent.toFixed(2);
                document.getElementById('display_base').innerText = latestData.nav_base.toLocaleString();
                document.getElementById('display_time').innerText = latestData.updated_at;

                // 履歴テーブルの生成
                const tbody = document.getElementById('history_table_body');
                tbody.innerHTML = '';

                dataList.forEach((item, index) => {
                    const tr = document.createElement('tr');
                    const diffStr = (item.diff_nav >= 0 ? "+" : "") + Math.round(item.diff_nav).toLocaleString();
                    const percentStr = (item.r_pred_percent >= 0 ? "+" : "") + item.r_pred_percent.toFixed(2);

                    let actualNavText = "<span style='color: gray; font-size: 0.8em;'>確認待ち</span>";
                    if (index > 0 && dataList[index - 1].nav_base) {
                        const actualNav = dataList[index - 1].nav_base;
                        const prevNav = item.nav_base; // その日の計算ベース（前日の実際の価格）
                        
                        // 実際の騰落率を計算
                        const actualDiff = actualNav - prevNav;
                        const actualPercent = (actualDiff / prevNav) * 100;
                        
                        const actualDiffStr = (actualDiff >= 0 ? "+" : "") + actualDiff.toLocaleString();
                        const actualPercentStr = (actualPercent >= 0 ? "+" : "") + actualPercent.toFixed(2);
                        
                        actualNavText = "<strong>" + dataList[index - 1].nav_base.toLocaleString() + " 円</strong>";
                            + "<br><span style='color:" + (actualDiff >= 0 ? "#e74c3c" : "#3498db") 
                            + ";font-size:0.85em;'>" + actualDiffStr + "円 (" + actualPercentStr + "%)</span>";
                    }
                    
                    tr.innerHTML = `
                        <td>${item.date}</td>
                        <td>${Math.round(item.nav_pred).toLocaleString()} 円</td>
                        <td style="color: ${item.diff_nav >= 0 ? '#e74c3c' : '#3498db'}; font-weight: bold;">${diffStr} 円 (${percentStr}%)</td>
                        <td>${actualNavText}</td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(error => console.error('データの読み込みに失敗しました:', error));

        // ==========================================
        // 2. 積立シミュレーターのロジック
        // ==========================================
        const ctx = document.getElementById('simChart').getContext('2d');
        let simChart = null;

        // 各種入力要素の取得
        const inputs = {
            amount: { slide: document.getElementById('slide_amount'), num: document.getElementById('num_amount') },
            years: { slide: document.getElementById('slide_years'), num: document.getElementById('num_years') },
            rate: { slide: document.getElementById('slide_rate'), num: document.getElementById('num_rate') }
        };

        // スライダーと数値入力ボックスの値を同期させるイベント
        function setupSync(target) {
            target.slide.addEventListener('input', (e) => { target.num.value = e.target.value; calculateSimulation(); });
            target.num.addEventListener('input', (e) => { target.slide.value = e.target.value; calculateSimulation(); });
        }
        setupSync(inputs.amount);
        setupSync(inputs.years);
        setupSync(inputs.rate);

        // シミュレーション計算およびグラフ更新関数
        function calculateSimulation() {
            const monthlyAmount = parseFloat(inputs.amount.num.value) * 10000; // 円単位に変換
            const years = parseInt(inputs.years.num.value);
            const annualRate = parseFloat(inputs.rate.num.value) / 100;

            const labels = [];
            const principalData = [];
            const totalData = [];

            let currentTotal = 0;
            let currentPrincipal = 0;
            const monthlyRate = annualRate / 12;

            labels.push("初期");
            principalData.push(0);
            totalData.push(0);

            // 毎月複利での計算ロジック
            for (let y = 1; y <= years; y++) {
                for (let m = 1; m <= 12; m++) {
                    currentPrincipal += monthlyAmount;
                    currentTotal = (currentTotal + monthlyAmount) * (1 + monthlyRate);
                }
                labels.push(y + "年目");
                principalData.push(Math.round(currentPrincipal / 10000)); // 万円単位
                totalData.push(Math.round(currentTotal / 10000));
            }

            // 最終結果の数値を画面に反映
            const finalPrincipal = currentPrincipal / 10000;
            const finalTotal = currentTotal / 10000;
            const finalEarnings = finalTotal - finalPrincipal;

            document.getElementById('res_principal').innerText = formatResultText(finalPrincipal);
            document.getElementById('res_earnings').innerText = "+ " + formatResultText(finalEarnings);
            document.getElementById('res_total').innerText = formatResultText(finalTotal);

            // グラフの描画・更新
            updateChart(labels, principalData, totalData);
        }

        function formatResultText(val) {
            if (val >= 10000) {
                const oku = Math.floor(val / 10000);
                const man = Math.round(val % 10000);
                return oku + "億" + (man > 0 ? man.toLocaleString() : "") + "万円";
            }
            return Math.round(val).toLocaleString() + "万円";
        }

        function updateChart(labels, principalData, totalData) {
            if (simChart) {
                simChart.data.labels = labels;
                simChart.data.datasets[0].data = totalData;
                simChart.data.datasets[1].data = principalData;
                simChart.update();
            } else {
                simChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: '資産総額（元本+収益）',
                                data: totalData,
                                backgroundColor: 'rgba(52, 152, 219, 0.2)',
                                borderColor: '#3498db',
                                borderWidth: 2,
                                fill: true,
                                tension: 0.1
                            },
                            {
                                label: '積立金額（元本）',
                                data: principalData,
                                backgroundColor: 'rgba(189, 195, 199, 0.4)',
                                borderColor: '#bdc3c7',
                                borderWidth: 2,
                                fill: true,
                                tension: 0.1
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                ticks: { callback: (value) => value + '万' },
                                grid: { color: '#eaeaea' }
                            },
                            x: { grid: { display: false } }
                        },
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });
            }
        }

        // 初回読み込み時にシミュレーションを実行
        calculateSimulation();
    </script>
</body>
</html>
