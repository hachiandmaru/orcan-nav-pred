<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>オルカン予想ツール</title>
</head>
<body>
    <h2>本日のオルカン予想基準価額</h2>
    <h3 style="margin-top: 30px;">直近の予想と結果の履歴</h3>
    <table border="1" style="border-collapse: collapse; width: 100%; max-width: 600px; text-align: center;">
        <thead style="background-color: #eee;">
            <tr>
                <th>日付</th>
                <th>予想価格</th>
                <th>予想前日比</th>
                <th>実際の基準価額</th> </tr>
        </thead>
        <tbody id="history_table_body">
            </tbody>
    </table>
    
    <div style="background-color: #f0f8ff; padding: 15px; border-radius: 8px;">
        <p>予想基準価額: <strong id="display_nav">--</strong> 円
            <span style="font-size: 0.8em; color: gray;">(前回基準価額: <span id="display_base">--</span> 円)</span>
    　　</p>
        <p>前日比: <span id="display_diff">--</span> 円 (<span id="display_percent">--</span>%)</p>
        <p style="font-size: 12px; color: gray;">最終更新日時: <span id="display_time">--</span></p>
    </div>

<script>
        fetch('result.json')
            .then(response => response.json())
            .then(dataList => {
                // 万が一データが古い形式（リストではない）場合は処理を止める
                if (!Array.isArray(dataList) || dataList.length === 0) return;

                // --- 1. 最新のデータ（配列の0番目）を上部のメイン枠に表示 ---
                const latestData = dataList[0];
                document.getElementById('display_nav').innerText = Math.round(latestData.nav_pred).toLocaleString();
                document.getElementById('display_diff').innerText = (latestData.diff_nav >= 0 ? "+" : "") + Math.round(latestData.diff_nav);
                document.getElementById('display_percent').innerText = (latestData.r_pred_percent >= 0 ? "+" : "") + latestData.r_pred_percent.toFixed(2);
                document.getElementById('display_base').innerText = latestData.nav_base.toLocaleString();
                document.getElementById('display_time').innerText = latestData.updated_at;

                // --- 2. 履歴データ（配列全体）を表にループで追加 ---
                const tbody = document.getElementById('history_table_body');
                tbody.innerHTML = ''; // 表を一旦クリア

                dataList.forEach(item => {
                    const tr = document.createElement('tr');
                    
                    // プラスマイナスの符号付きの文字列を作成
                    const diffStr = (item.diff_nav >= 0 ? "+" : "") + Math.round(item.diff_nav);
                    const percentStr = (item.r_pred_percent >= 0 ? "+" : "") + item.r_pred_percent.toFixed(2);

                    // 実際の基準価額（毎朝手動で入力する NAV_BASE を、翌日のデータとして表示するロジック）
                    // ※ ここは少し複雑なので、まずは「確認待ち」として表示します
                    let actualNavText = "<span style='color: gray; font-size: 0.8em;'>確認待ち</span>";
                    
                    tr.innerHTML = `
                        <td>${item.date}</td>
                        <td>${Math.round(item.nav_pred).toLocaleString()} 円</td>
                        <td style="color: ${item.diff_nav >= 0 ? 'red' : 'blue'};">${diffStr} 円 (${percentStr}%)</td>
                        <td>${actualNavText}</td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(error => console.error('データの読み込みに失敗しました:', error));
    </script>
</body>
</html>
